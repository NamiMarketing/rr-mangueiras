<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RR Mangueiras – Em Breve</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #111;
      font-family: Arial, sans-serif;
      color: #fff;
      text-align: center;
      padding: 24px;
    }

    .container {
      max-width: 480px;
    }

    img {
      width: 180px;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    p {
      font-size: 1rem;
      color: #aaa;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.png" alt="RR Mangueiras" />
    <h1>Site em Construção</h1>
    <p>Estamos trabalhando para trazer algo novo em breve.<br>Em caso de dúvidas, entre em contato conosco.</p>
  </div>
</body>
</html>
